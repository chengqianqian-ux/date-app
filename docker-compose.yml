# 本地开发用 Postgres（可选，装了 Docker 才用）
# 启动：docker compose up -d
# 连接串：postgres://dateapp:dateapp@localhost:5432/dateapp
version: "3"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dateapp
      POSTGRES_PASSWORD: dateapp
      POSTGRES_DB: dateapp
    ports:
      - "5432:5432"
    volumes:
      - dateapp_pgdata:/var/lib/postgresql/data

volumes:
  dateapp_pgdata:
